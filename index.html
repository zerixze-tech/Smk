<!DOCTYPE html>
<html>
<head>
  <title>Shock Page</title>
</head>
<body>

  <h1>Selamat Datang 😎</h1>

  <script>
    setTimeout(function() {
      if (navigator.vibrate) {
        navigator.vibrate(1000);
      }
      document.body.style.pointerEvents = 'none';
    }, 1000);
  </script>

</body>
</html>
